financials.persistence.mode=postgres

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/financial_app}
spring.datasource.username=${DATABASE_USERNAME:financial_app_user}
spring.datasource.password=${DATABASE_PASSWORD:financial_app_password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
